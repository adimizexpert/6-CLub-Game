<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="6 Club Colour Prediction Game">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03002e"/>
      <stop offset="1" stop-color="#120a66"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EFBF04"/>
      <stop offset="1" stop-color="#ffdd55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <g opacity="0.12">
    <circle cx="220" cy="140" r="90" fill="#EFBF04"/>
    <circle cx="980" cy="180" r="120" fill="#EFBF04"/>
    <circle cx="920" cy="470" r="150" fill="#EFBF04"/>
    <circle cx="260" cy="470" r="130" fill="#EFBF04"/>
  </g>

  <rect x="80" y="90" width="1040" height="420" rx="24" fill="rgba(0,0,0,0.18)" stroke="rgba(239,191,4,0.35)" stroke-width="2"/>

  <text x="120" y="190" fill="url(#gold)" font-family="Orbitron, Arial, sans-serif" font-size="54" font-weight="700">
    6 Club Colour Prediction Game
  </text>
  <text x="120" y="245" fill="rgba(255,255,255,0.88)" font-family="Poppins, Arial, sans-serif" font-size="22">
    Image placeholder — add your real game image as /public/images/6clubcolour.webp
  </text>

  <g transform="translate(120, 310)">
    <rect x="0" y="0" width="86" height="86" rx="16" fill="#ff4d4d"/>
    <rect x="110" y="0" width="86" height="86" rx="16" fill="#22c55e"/>
    <rect x="220" y="0" width="86" height="86" rx="16" fill="#3b82f6"/>
    <rect x="330" y="0" width="86" height="86" rx="16" fill="#f59e0b"/>
    <rect x="440" y="0" width="86" height="86" rx="16" fill="#a855f7"/>
  </g>

  <text x="120" y="470" fill="rgba(255,255,255,0.75)" font-family="Poppins, Arial, sans-serif" font-size="16">
    Tip: file names are case-sensitive on Linux hosting — keep them exactly as shown.
  </text>
</svg>


