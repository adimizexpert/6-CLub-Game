<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="6Club Android app download illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03002e"/>
      <stop offset="1" stop-color="#120a66"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EFBF04"/>
      <stop offset="1" stop-color="#ffdd55"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <g opacity="0.22">
    <ellipse cx="600" cy="980" rx="420" ry="70" fill="#EFBF04"/>
  </g>

  <!-- phones -->
  <g filter="url(#shadow)">
    <g transform="translate(210,220) rotate(-8 300 450)">
      <rect x="120" y="40" width="420" height="820" rx="56" fill="#0b0b16" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
      <rect x="150" y="120" width="360" height="650" rx="30" fill="rgba(239,191,4,0.08)" stroke="rgba(239,191,4,0.25)" stroke-width="2"/>
      <circle cx="330" cy="86" r="10" fill="rgba(255,255,255,0.35)"/>
      <rect x="260" y="820" width="140" height="18" rx="9" fill="rgba(255,255,255,0.20)"/>
      <text x="185" y="200" fill="url(#gold)" font-family="Orbitron, Arial, sans-serif" font-size="42" font-weight="700">6CLUB</text>
      <text x="185" y="250" fill="rgba(255,255,255,0.75)" font-family="Poppins, Arial, sans-serif" font-size="20">Android Preview</text>
    </g>

    <g transform="translate(540,170) rotate(8 300 480)">
      <rect x="120" y="40" width="420" height="880" rx="56" fill="#0b0b16" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
      <rect x="150" y="120" width="360" height="710" rx="30" fill="rgba(239,191,4,0.10)" stroke="rgba(239,191,4,0.28)" stroke-width="2"/>
      <circle cx="330" cy="86" r="10" fill="rgba(255,255,255,0.35)"/>
      <rect x="260" y="870" width="140" height="18" rx="9" fill="rgba(255,255,255,0.20)"/>
      <text x="185" y="210" fill="url(#gold)" font-family="Orbitron, Arial, sans-serif" font-size="42" font-weight="700">6CLUB</text>
      <text x="185" y="260" fill="rgba(255,255,255,0.75)" font-family="Poppins, Arial, sans-serif" font-size="20">Android Preview</text>
    </g>
  </g>

  <!-- Google Play badge -->
  <g transform="translate(380,70)" filter="url(#shadow)">
    <rect x="0" y="0" width="440" height="120" rx="24" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
    <g transform="translate(30,28)">
      <path d="M18 10l58 34-58 34z" fill="#22c55e"/>
      <path d="M18 10l30 18-30 18z" fill="#3b82f6" opacity="0.85"/>
      <path d="M48 28l28 16-28 16z" fill="#f59e0b" opacity="0.9"/>
    </g>
    <text x="120" y="72" fill="rgba(255,255,255,0.92)" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="700">Google Play</text>
  </g>

  <text x="60" y="1140" fill="rgba(255,255,255,0.65)" font-family="Poppins, Arial, sans-serif" font-size="18">
    Replace this placeholder with your provided image by saving it as public/images/android-play.webp and updating the src.
  </text>
</svg>


